services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jobmatch
      POSTGRES_USER: jobmatch
      POSTGRES_PASSWORD: jobmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://jobmatch:jobmatch@postgres:5432/jobmatch
      REDIS_URL: redis://redis:6379/0
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  ingestion-scheduler:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    command: ["python", "-m", "ingestion.scheduler"]
    environment:
      DATABASE_URL: postgresql://jobmatch:jobmatch@postgres:5432/jobmatch
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ingestion-crawler:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    command: ["python", "-m", "ingestion.crawl_worker"]
    environment:
      DATABASE_URL: postgresql://jobmatch:jobmatch@postgres:5432/jobmatch
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ingestion-upserter:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    command: ["python", "-m", "ingestion.upserter"]
    environment:
      DATABASE_URL: postgresql://jobmatch:jobmatch@postgres:5432/jobmatch
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ingestion-embedder:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    command: ["python", "-m", "ingestion.embedder"]
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://jobmatch:jobmatch@postgres:5432/jobmatch
      REDIS_URL: redis://redis:6379/0
      # Jina free tier caps at ~100k embedding tokens/min; 32-job batches with a
      # pause stay under it. Raise for providers with higher limits.
      EMBED_BATCH_SIZE: "32"
      EMBED_PAUSE_SECONDS: "20"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
